# HTTP-level directives included by /etc/nginx/nginx.conf inside the http {} block.
# This file is separate from nginx.conf (the server block) because limit_req_zone
# must live at the http level, not the server level.

# Rate limit: 60 requests/minute per IP, 10 MB state zone (~160 k IPs).
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
