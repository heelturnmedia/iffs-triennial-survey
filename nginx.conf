server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed assets if available
    gzip_static on;

    # Rate limiting (zone defined in nginx-http.conf)
    limit_req zone=general burst=20 nodelay;

    # ── Security headers ──────────────────────────────────────────────────────
    # Defined per-location because nginx add_header does NOT inherit into child
    # blocks that set their own add_header directives.

    # ── env-config.js: never cache, security headers ──────────────────────────
    # Must come BEFORE the static assets regex so the exact match wins.
    location = /env-config.js {
        add_header Cache-Control              "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options     "nosniff"                             always;
        add_header X-Frame-Options            "DENY"                                always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    }

    # ── index.html: never cache, full security headers ────────────────────────
    location = /index.html {
        add_header Cache-Control             "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header X-Frame-Options           "DENY"                                always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https://*.mapbox.com; connect-src 'self' https://njvvktgtnadvooxhqhwf.supabase.co wss://njvvktgtnadvooxhqhwf.supabase.co https://api.mapbox.com https://events.mapbox.com https://*.mapbox.com; worker-src blob:; frame-ancestors 'none';"
            always;
    }

    # ── Cache static assets aggressively (Vite hashes filenames) ─────────────
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control         "public, immutable" always;
        add_header X-Content-Type-Options "nosniff"          always;
        access_log off;
    }

    # ── SPA fallback — full security headers ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header X-Frame-Options           "DENY"                                always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https://*.mapbox.com; connect-src 'self' https://njvvktgtnadvooxhqhwf.supabase.co wss://njvvktgtnadvooxhqhwf.supabase.co https://api.mapbox.com https://events.mapbox.com https://*.mapbox.com; worker-src blob:; frame-ancestors 'none';"
            always;
    }
}
