<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/iffs-logo.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1d7733" />

    <!-- Primary meta -->
    <title>IFFS 2026 Triennial Survey</title>
    <meta name="description" content="The official IFFS 2026 Triennial Survey — mapping the global state of fertility care across 147 countries." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="IFFS 2026 Triennial Survey" />
    <meta property="og:description" content="The official IFFS 2026 Triennial Survey — mapping the global state of fertility care across 147 countries." />
    <meta property="og:image"       content="/og-image.png" />
    <meta property="og:url"         content="https://survey.iffs.org" />
    <meta property="og:site_name"   content="IFFS Triennial Survey" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="IFFS 2026 Triennial Survey" />
    <meta name="twitter:description" content="The official IFFS 2026 Triennial Survey — mapping the global state of fertility care across 147 countries." />
    <meta name="twitter:image"       content="/og-image.png" />

    <!-- Google Fonts: Raleway (display) + Source Sans 3 (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- SurveyJS core styles -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/survey-core/survey-core.min.css"
    />

    <!-- SurveyJS Creator styles -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/survey-creator-core/survey-creator-core.min.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
