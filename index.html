<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1d7733" />

    <!-- Primary meta -->
    <title>IFFS 2026 Triennial Survey</title>
    <meta name="description" content="The official IFFS 2026 Triennial Survey — mapping the global state of fertility care across 147 countries." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="IFFS 2026 Triennial Survey" />
    <meta property="og:description" content="The official IFFS 2026 Triennial Survey — mapping the global state of fertility care across 147 countries." />
    <meta property="og:image"       content="/og-image.png" />
    <meta property="og:url"         content="https://survey.iffs.org" />
    <meta property="og:site_name"   content="IFFS Triennial Survey" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="IFFS 2026 Triennial Survey" />
    <meta name="twitter:description" content="The official IFFS 2026 Triennial Survey — mapping the global state of fertility care across 147 countries." />
    <meta name="twitter:image"       content="/og-image.png" />

    <!-- Fonts (Raleway + Source Sans 3) and SurveyJS CSS are bundled via Vite
         from npm packages — no external CDN requests needed. -->
  </head>
  <body>
    <div id="root"></div>
    <!-- Runtime env vars injected by docker-entrypoint.sh (production only) -->
    <script src="/env-config.js" onerror="window.__env={}"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
